<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Frases para ti</title>

  <style>
    body {
      font-family: Arial;
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f6d365, #fda085);
    }

    .container {
      text-align: center;
    }

    .card {
      width: 350px;
      height: 180px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 25px;
      font-size: 19px;
      margin-bottom: 25px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    button {
      border: none;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      background: #333;
      color: white;
      transition: 0.25s;
    }

    button:hover {
      background: #555;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="card" id="frase"></div>

    <div class="buttons">
      <button onclick="anterior()">⬅ Anterior</button>
      <button onclick="siguiente()">Siguiente ➡</button>
    </div>

  </div>

  <script>

    const frases = [
      "Tu sonrisa tiene algo que la hace especial.",
      "Mujer ejemplar, ¿dónde se hallará? ¡Es más valiosa que las piedras preciosas! (Proverbios 31:10)",
      "Mujer virtuosa, ¿quien la hallará? Porque su estima sobrepasa largamente a la de las piedras preciosas. (En otra versión)",
      "Todo lo que hagan, háganlo con amor. (ganar su corazón)",
      "¡Cuán bella eres, amada mía! ¡Cuán bella eres! ¡Tus ojos son dos palomas! (Cantares 1:15)",
      "Toda tú eres bella, amada mía; no hay en ti defecto alguno. (Cantares 4:7)",
    ];

    let index = 0;
    const frase = document.getElementById("frase");

    function mostrarFrase() {
      frase.textContent = frases[index];
    }

    function siguiente() {
      index = (index + 1) % frases.length;
      mostrarFrase();
    }

    function anterior() {
      index = (index - 1 + frases.length) % frases.length;
      mostrarFrase();
    }

    mostrarFrase();

  </script>

</body>

</html>
